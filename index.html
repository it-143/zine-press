<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEMS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body, html {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  .gradient-bg {
    position: fixed;
    inset: 0;
    animation: gradientShift 8s ease infinite;
    background-size: 300% 300%;
    background-image: linear-gradient(135deg,
      #ffd6e7, #ffecd2, #c3f5ea, #d8b4fe,
      #ffd6e7, #a7f3d0, #fde68a);
    z-index: 0;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .pulse-ring {
    position: fixed;
    top: 50%; left: 50%;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    animation: pulse 4s ease-in-out infinite;
    transform: translate(-50%, -50%);
    width: 400px; height: 400px;
    z-index: 1;
  }
  .pulse-ring:nth-child(2) {
    animation-delay: -1.3s;
    width: 600px; height: 600px;
    background: rgba(255,255,255,0.09);
  }
  .pulse-ring:nth-child(3) {
    animation-delay: -2.6s;
    width: 820px; height: 820px;
    background: rgba(255,255,255,0.05);
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(0.95); opacity: 0.6; }
    50%       { transform: translate(-50%,-50%) scale(1.05); opacity: 1; }
  }

  .ui {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 28px 32px;
  }

  /* --- macOS-style menu bar --- */
  .menu-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .traffic-lights {
    display: flex;
    gap: 6px;
    margin-right: 10px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }

  .menu-item { position: relative; }

  .menu-trigger {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 0.5px solid rgba(255,255,255,0.85);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(30,20,50,0.85);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
    user-select: none;
  }
  .menu-trigger:hover { background: rgba(255,255,255,0.75); }
  .menu-trigger.active { background: rgba(255,255,255,0.88); }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 220px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(255,255,255,0.9);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(100,60,160,0.12), 0 2px 8px rgba(0,0,0,0.06);
    padding: 6px;
    z-index: 100;
  }
  .dropdown.open { display: block; }

  .dropdown-section { padding: 2px 0; }
  .dropdown-section + .dropdown-section {
    border-top: 0.5px solid rgba(0,0,0,0.08);
    margin-top: 2px;
    padding-top: 4px;
  }
  .dropdown-label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(60,40,100,0.45);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px 2px;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 7px;
    font-size: 13px;
    color: rgba(20,10,40,0.85);
    cursor: pointer;
    transition: background 0.1s;
    text-decoration: none;
  }
  .dropdown-item:hover { background: rgba(160,100,255,0.12); }
  .item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* --- Centered logo --- */
  .logo-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
  }
  .logo-wrap img {
    width: 480px;
    max-width: 80vw;
    display: block;
  }
</style>
</head>

<script>
  function toggleMenu() {
    var d = document.getElementById('dropdown');
    var t = document.getElementById('menuTrigger');
    var open = d.classList.contains('open');
    if (open) {
      d.classList.remove('open');
      t.classList.remove('active');
    } else {
      d.classList.add('open');
      t.classList.add('active');
    }
  }

  document.addEventListener('click', function(e) {
    var item = document.getElementById('menuItem');
    if (!item.contains(e.target)) {
      document.getElementById('dropdown').classList.remove('open');
      document.getElementById('menuTrigger').classList.remove('active');
    }
  });
</script>
